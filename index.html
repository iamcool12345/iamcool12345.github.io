<!DOCTYPE html>
<html lang="en">
   <head>
      <meta charset="UTF-8">
      <link rel="stylesheet" type="text/css" href="style.css"/>
      <link rel="icon" href="images/favicon.png" type="image/x-icon">
      <title>Tourism Agency</title>
   </head>
   <body>
      <div class="topbar">
         <div class="topbar-content">
            <div class="topbar-left">
               Tourism Agency
            </div>
            <div class="topbar-right">
               <a href="https://www.facebook.com/VamosAcademySpain/"title="Facebook">Facebook</a>
               <span>|</span>
               <a href="https://twitter.com/VamosAcademy" title="Twitter">Twitter</a>
               <span>|</span>
               <a href="https://www.instagram.com/vamospanishmalaga/" title="Instagram">Instagram</a>
               <span>|</span>
               <button id="langToggle" title="toggle language between english/Spanish"></button>
            </div>
         </div>
      </div>
      <div id="main">
         <div class="header">Tourism agency</div>
         <div id = "intro">
            Vamos Agency
         </div>
         <div class="services-grid">
            <div class="gridbox top" id="Language">
               <h2>Language Experience</h2>
            </div>
            <div class="gridbox top Land"id="Land">
               <h2>Land Tours</h2>
            </div>
            <div class="gridbox top Water"id="Water">
               <h2>Water Tours</h2>
               <img width="100%" src="images/site/infocards/watertours.jpg">
            </div>
            <div class="gridbox bottom Bike"id="Bike">
               <h2>Bike Tours</h2>
               <img width="100%" src="images/site/infocards/fatbikes.jpg">
            </div>
            <div class="gridbox bottom events"id="events">
               <h2>Events</h2>
               <img width="100%" src="images/site/infocards/events.png">
            </div>
            <div class="gridbox bottom accommodations"id="accomodations">
               <h2>Accommodations</h2>
               <img width="100%" src="images/site/infocards/accomodations.jpg">
            </div>
         </div>
         <section class="bike-section">
            <h2 class="section-title">Bike Fleet</h2>
            <div class="bike-type-selector">
               <button id="prevType">&#10094;</button>
               <span id="currentType">All</span>
               <button id="nextType">&#10095;</button>
            </div>
            <div class="bike-deck"></div>
         </section>
         <div id="map"></div>
         <div class="booking-section">
            <div class="formbox">
               <h2>Booking</h2>
               <form action="https://formspree.io/f/xrenkkyw" method="POST">
                  <label id="fname">First Name</label><br>
                  <input type="text" name="fname"><br>
                  <label id="lname">Last Name</label><br>
                  <input type="text" name="lname"><br>
                  <label id="email">Email</label><br>
                  <input type="email" name="email"><br>
                  <label id="btype">Bike Type</label><br>
                  <select name="bikeType" id="bikeSelect" required></select><br>
                  <label id="quantity">Quantity</label><br>
                  <input type="number" name="Quantity"><br>
                  <label id="date">date </label><br>
                  <input type="date" name="date"><br>
                  <button id="bookutton" title="CLICK!!"type="submit">Book Now</button>
               </form>
            </div>
         </div>
      </div>
      <link rel="stylesheet"href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
      <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
      <meta name="viewport" content="width=device-width, initial-scale=0.8, user-scalable=no">
      <script src="jquery.js" type="text/javascript"></script>
      <script src="bikes.js" type="text/javascript"></script>
      <script src="infocards_links.js" type="text/javascript"></script>
      <script src="script.js" type="text/javascript"></script>
      <script src="translationvalues.js" type="text/javascript"></script>
      <script src="localization.js" type="text/javascript"></script>
   </body>
   <footer>
      <div >
         <p id="Information">Information</p>
         <p id="imprint"><u>imprint</u></p>
         <p id="legal"><u>legal</u></p>
         <p id="contact">contact<br>
         <p id="address">
            <span style="color: aqua;">address: </span>address
            <br>
            address
            <br>
            address
         </p>
         <p id = "phone"> <span style="color: aqua;">phone:</span>phone</p>
         </p>
      </div>
   </footer>
</html>
